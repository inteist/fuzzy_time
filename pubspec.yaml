name: fuzzy_time
description: "A simple, dependency-free Flutter/Dart package that converts DateTime and Duration objects into human-friendly conversational fuzzy time strings e.g. 'less than 5 minutes ago', 'in about 2 hours', 'just now', etc. Similar to time ago packages but with more flexible and natural language"
version: 0.3.6
homepage: https://inteist.com/
repository: https://github.com/inteist/fuzzy_time

environment:
  sdk: ^3.10.4

dependencies:

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0

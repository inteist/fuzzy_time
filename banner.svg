<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;800&amp;display=swap');
      .title {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 96px;
        fill: #f8fafc;
        letter-spacing: -3px;
      }
      .subtitle {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        font-weight: 500;
        font-size: 32px;
        fill: #94a3b8;
      }
      .accent {
        fill: #8b5cf6;
      }
    </style>
    
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" /> <!-- slate-900 -->
      <stop offset="100%" stop-color="#020617" /> <!-- slate-950 -->
    </linearGradient>

    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" /> 
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(59, 130, 246, 0.15)"/>
      <stop offset="100%" stop-color="rgba(59, 130, 246, 0)"/>
    </radialGradient>
    
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(139, 92, 246, 0.15)"/>
      <stop offset="100%" stop-color="rgba(139, 92, 246, 0)"/>
    </radialGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  
  <!-- Glowing Orbs -->
  <circle cx="250" cy="200" r="300" fill="url(#glowBlue)" />
  <circle cx="950" cy="200" r="400" fill="url(#glowPurple)" />

  <!-- Abstract Waves -->
  <path d="M0,400 Q300,320 600,380 T1200,340 L1200,400 L0,400 Z" fill="rgba(139, 92, 246, 0.05)" />
  <path d="M0,400 Q400,280 800,360 T1200,300 L1200,400 L0,400 Z" fill="rgba(59, 130, 246, 0.05)" />

  <!-- Logo Group -->
  <g transform="translate(180, 72) scale(0.5)" filter="url(#shadow)">
    <!-- App icon rounded background -->
    <rect width="512" height="512" rx="112" fill="url(#logoGrad)" />
    
    <!-- Shadowed group for all icon elements to unify the depth effect -->
    <g filter="url(#shadow)">
      <!-- Outer clock ring (semi-transparent white) -->
      <circle cx="256" cy="256" r="176" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="16" />
      
      <!-- Cardinal clock ticks -->
      <line x1="256" y1="96" x2="256" y2="120" stroke="white" stroke-width="20" stroke-linecap="round" />
      <line x1="256" y1="416" x2="256" y2="392" stroke="white" stroke-width="20" stroke-linecap="round" />
      <line x1="96" y1="256" x2="120" y2="256" stroke="white" stroke-width="20" stroke-linecap="round" />
      <line x1="416" y1="256" x2="392" y2="256" stroke="white" stroke-width="20" stroke-linecap="round" />
      
      <!-- Central fuzzy tilde -->
      <path d="M 156 256 C 190 170, 226 220, 256 256 S 322 342, 356 256" 
            stroke="white" stroke-width="40" stroke-linecap="round" fill="none" />
    </g>
  </g>

  <!-- Typography -->
  <g transform="translate(520, 210)">
    <text x="0" y="0" class="title">fuzzy<tspan class="accent">_</tspan>time</text>
    <text x="6" y="56" class="subtitle">Human-friendly time descriptions</text>
  </g>
</svg>

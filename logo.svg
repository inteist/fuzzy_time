<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium vibrant gradient from Blue to Violet (Flutter ecosystem vibes) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- Blue 500 -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet 500 -->
    </linearGradient>
    
    <!-- Smooth, deep shadow to give depth to the white elements -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1e1b4b" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- App icon rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Shadowed group for all icon elements to unify the depth effect -->
  <g filter="url(#shadow)">
    <!-- Outer clock ring (semi-transparent white) -->
    <circle cx="256" cy="256" r="176" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="16" />
    
    <!-- Cardinal clock ticks -->
    <line x1="256" y1="96" x2="256" y2="120" stroke="white" stroke-width="20" stroke-linecap="round" />
    <line x1="256" y1="416" x2="256" y2="392" stroke="white" stroke-width="20" stroke-linecap="round" />
    <line x1="96" y1="256" x2="120" y2="256" stroke="white" stroke-width="20" stroke-linecap="round" />
    <line x1="416" y1="256" x2="392" y2="256" stroke="white" stroke-width="20" stroke-linecap="round" />
    
    <!-- Central "fuzzy" tilde replacing the hands.
         Calculated as a perfectly rotationally symmetric cubic bezier curve spanning across the clock. -->
    <path d="M 156 256 C 190 170, 226 220, 256 256 S 322 342, 356 256" 
          stroke="white" stroke-width="40" stroke-linecap="round" fill="none" />
  </g>
</svg>
